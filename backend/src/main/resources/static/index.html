<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chrono Agent Demo</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Chrono Agent Demo</h1>
      <p>实时流、会话后处理、人物记忆和 Agent 召回全流程演示</p>
    </div>
    <div class="user-strip">
      <label for="userId">User ID</label>
      <input id="userId" value="demo-user" autocomplete="off">
      <button id="refreshBtn" class="primary">刷新数据</button>
    </div>
  </header>

  <main class="workspace">
    <section class="panel lifecycle-panel">
      <div class="panel-title">
        <span>01</span>
        <h2>实时流和会话生命周期</h2>
      </div>

      <div class="control-block">
        <label>WebSocket 实时流</label>
        <div class="button-row">
          <button id="wsStartBtn">开始流式录音</button>
          <button id="wsStopBtn" disabled>停止流并处理</button>
        </div>
        <div id="wsStatus" class="status-line">未连接</div>
        <section id="wsProgress" class="stream-progress" aria-live="polite"></section>
      </div>
    </section>

    <section class="panel side-panel">
      <div class="panel-title">
        <span>02</span>
        <h2>人物和记忆</h2>
      </div>
      <h3>周围人物</h3>
      <div id="speakers" class="stack"></div>
      <h3>候选记忆</h3>
      <div id="memoryCandidates" class="stack"></div>
      <h3>长期记忆</h3>
      <div id="memoryItems" class="stack"></div>
    </section>

    <section class="panel timeline-panel">
      <div class="panel-title">
        <span>03</span>
        <h2>后处理结果和会话记录</h2>
      </div>
      <div id="timeline" class="timeline"></div>
    </section>

    <section class="panel agent-panel">
      <div class="panel-title">
        <span>04</span>
        <h2>Agent 对话和召回</h2>
      </div>
      <div id="chatLog" class="chat-log"></div>
      <form id="agentForm" class="agent-input">
        <input id="agentMessage" placeholder="问一下最近状态、人物互动或压力变化">
        <button type="submit">发送</button>
      </form>
      <h3>本次召回上下文</h3>
      <div id="recallContext" class="recall-grid"></div>
    </section>

    <section class="panel capture-panel">
      <div class="panel-title">
        <span>05</span>
        <h2>补充数据写入</h2>
      </div>

      <form id="uploadForm" class="control-block">
        <label for="audioFile">上传录音文件</label>
        <input id="audioFile" type="file" accept="audio/*">
        <button type="submit">上传并分析</button>
      </form>

      <div class="control-block">
        <label>浏览器麦克风录音</label>
        <div class="button-row">
          <button id="recordStartBtn">开始录音</button>
          <button id="recordStopBtn" disabled>停止并上传</button>
        </div>
        <div id="recordingStatus" class="status-line">未录音</div>
      </div>

      <form id="healthForm" class="control-block">
        <label>健康事件</label>
        <select id="healthType">
          <option value="mood_check_in">心情打卡</option>
          <option value="stress_score">压力评分</option>
          <option value="sleep_duration">睡眠时长</option>
          <option value="heart_rate">心率</option>
          <option value="steps">步数</option>
          <option value="activity_minutes">活动分钟</option>
        </select>
        <div class="two-col">
          <input id="healthValue" placeholder="数值或文本">
          <input id="healthUnit" placeholder="单位">
        </div>
        <button type="submit">写入健康事件</button>
      </form>
    </section>

    <section class="panel data-panel">
      <div class="panel-title">
        <span>06</span>
        <h2>已存储用户数据</h2>
      </div>
      <div class="tabs" id="dataTabs"></div>
      <pre id="dataViewer" class="data-viewer"></pre>
    </section>
  </main>

  <div id="toast" class="toast"></div>
  <script src="/app.js"></script>
</body>
</html>
